version: '3.7'
services:
  central-service:
    build:
      context: .
      dockerfile: central-service/Dockerfile
    depends_on:
      - broker
      - zookeeper
      - db
      - redis-cache
      - rtc-service
    restart: on-failure
    ports:
      - ${PORT_CENTRAL_SERVICE:-5050}:5000
    environment:
      FIREBASE_CREDENTIALS_FILEPATH: '/app/serviceKey.json'
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      MAX_NUM_ROUND_PER_ROOM: ${MAX_NUM_ROUND_PER_ROOM}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_INGRESS_TOPIC: ${KAFKA_INGRESS_TOPIC}
      KAFKA_EGRESS_TOPIC: ${KAFKA_EGRESS_TOPIC}
      KAFKA_CENTRAL_SERVICE_GID: ${KAFKA_CENTRAL_SERVICE_GID}
      SERVER_SECRET: ${SERVER_SECRET}
      RTC_SERVICE_URL: ws://rtc-service:8080/ws
      REDIS_ADDR: redis-cache:6379
    volumes:
      - ./seed-service:/app/seed-service
      - ./serviceKey.json:/app/serviceKey.json:ro
  rtc-service:
    build: ./rtc-service
    ports:
      - ${PORT_RTC_SERVICE:-5001}:8080
    environment:
      PORT: 8080
  worker-service:
    build: ./worker-service
    depends_on:
      - broker
    environment:
      LEETCODE_USERNAME: ${LEETCODE_USERNAME}
      LEETCODE_PASSWORD: ${LEETCODE_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_INGRESS_TOPIC: ${KAFKA_INGRESS_TOPIC}
      KAFKA_EGRESS_TOPIC: ${KAFKA_EGRESS_TOPIC}
      KAFKA_WORKER_GROUP_ID: "worker-service-group"
  db:
    image: postgres
    restart: always
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-volume:/var/lib/postgresql/data
  redis-cache:
    image: bitnami/redis:latest
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-volume:/bitnami/redis/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data-volume:/var/lib/zookeeper/data
      - zookeeper-log-volume:/var/lib/zookeeper/log
  broker:
    image: confluentinc/cp-kafka:7.3.0
    container_name: broker
    ports:
      - "${PORT_KAFKA:-29092}:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://broker:${PORT_KAFKA:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data-volume:/var/lib/kafka/data
  adminer:
    image: adminer
    restart: always
    ports:
      - ${PORT_ADMINER:-8080}:8080
  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - ${PORT_REDIS_INSIGHT:-8001}:5540
    volumes:
      - redisinsight-volume:/data
    restart: always

  server:
    build: ./server
    # image: bsg-server
    ports:
      - ${PORT_SERVER:-3000}:3000
    depends_on:
      - redis-cache
      - central-service
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SERVER_SECRET=${SERVER_SECRET}
      - CENTRAL_SERVICE_URL=http://central-service:5000
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
  web:
    build:
      context: ./bsg-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    ports:
      - ${PORT_WEB:-80}:80

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: acm-cloudflare-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}

volumes:
  db-volume:
  redis-volume:
    driver: local
  zookeeper-data-volume:
  zookeeper-log-volume:
  redisinsight-volume:
  kafka-data-volume:
